  :root {
    --bg: #131417;
    --card-bg: #1c1e22;
    --text: #f2f3f5;
    --muted: #9aa2ac;
    --accent: #2fd7cf;
    --accent-soft: rgba(47, 215, 207, .14);
    --border: rgba(255, 255, 255, .09);
    --surface: #24262b;
    --charcoal: #1a1c20;
    --charcoal-2: #0d0e10;
    --font-body: 'Manrope', -apple-system, "Segoe UI", Arial, sans-serif;
    --font-display: 'Syne', -apple-system, "Segoe UI", Arial, sans-serif;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, .3);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, .35);
    --shadow-lg: 0 18px 40px rgba(0, 0, 0, .45);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--charcoal), var(--charcoal-2));
    border-bottom: 1px solid rgba(255, 255, 255, .08);
    box-shadow: var(--shadow-md);
    padding: 10px 28px;
    z-index: 10;
  }
  .cabecalho {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
  }
  .cabecalho .logo {
    height: 46px;
    width: auto;
  }
  header h1 {
    margin: 0 0 8px;
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.01em;
    text-align: center;
    color: #ffffff;
  }
  .seta-opcoes {
    display: block;
    width: 12px;
    height: 12px;
    border-right: 2px solid rgba(255, 255, 255, .6);
    border-bottom: 2px solid rgba(255, 255, 255, .6);
    transform: rotate(-135deg);
    transition: transform .2s ease;
    margin-top: 4px;
  }
  header.recolhido .seta-opcoes { transform: rotate(45deg); margin-top: -2px; }
  .opcoes-header {
    display: grid;
    grid-template-rows: 1fr;
    opacity: 1;
    transition: grid-template-rows .25s ease, opacity .2s ease, margin-top .25s ease;
    margin-top: 4px;
  }
  .opcoes-header > div { overflow: hidden; }
  header.recolhido .opcoes-header {
    grid-template-rows: 0fr;
    opacity: 0;
    margin-top: 0;
  }
  .filtros {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filtros input, .filtros select {
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .filtros input:hover, .filtros select:hover { border-color: rgba(255, 255, 255, .2); }
  .filtros input:focus, .filtros select:focus {
    outline: none;
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .filtros input#busca {
    flex: 1;
    min-width: 240px;

<script>
  function atualizarRelogio() {
    const agora = new Date();
    document.getElementById("dataAtual").textContent = agora.toLocaleDateString("pt-BR");
    document.getElementById("horaAtual").textContent = agora.toLocaleTimeString("pt-BR");
  }
  atualizarRelogio();
  setInterval(atualizarRelogio, 1000);

  const LOGIN_USUARIO = "admin";
  const LOGIN_SENHA = "klaus2026";
  const loginBox = document.getElementById("loginBox");

  function renderLoginFormulario() {
    loginBox.classList.remove("logado");
    loginBox.innerHTML =
      '<form id="loginForm">' +
      '<input type="text" id="loginUser" placeholder="Usuario" autocomplete="username">' +
      '<input type="password" id="loginSenhaCampo" placeholder="Senha" autocomplete="current-password">' +
      '<button type="submit">Entrar</button>' +
      '</form>';
    document.getElementById("loginForm").addEventListener("submit", e => {
      e.preventDefault();
      const u = document.getElementById("loginUser").value;
      const s = document.getElementById("loginSenhaCampo").value;
      if (u === LOGIN_USUARIO && s === LOGIN_SENHA) {
        sessionStorage.setItem("catalogoLogado", "1");
        renderLoginLogado();
      } else {
        let erro = loginBox.querySelector(".erro");
        if (!erro) {
          erro = document.createElement("div");
          erro.className = "erro";
          loginBox.appendChild(erro);
        }
        erro.textContent = "Usuario ou senha invalidos";
      }
    });
  }

  function renderLoginLogado() {
    loginBox.classList.add("logado");
    loginBox.innerHTML =
      '<span class="usuario-logado">Ola, ' + LOGIN_USUARIO + '</span>' +
      '<button class="sair" id="logoutBtn">Sair</button>';
    document.getElementById("logoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem("catalogoLogado");
      renderLoginFormulario();
    });
  }

  if (sessionStorage.getItem("catalogoLogado") === "1") {
    renderLoginLogado();
  } else {
    renderLoginFormulario();
  }

  document.getElementById("cabecalhoToggle").addEventListener("click", () => {
    document.getElementById("header").classList.toggle("recolhido");
  });

  const promocoes = [{"titulo":"Lançamento","descricao":"Cadeira Urban Melke","foto":"fotos/cadeira melka cinza.jpg"},{"titulo":"Frete gratis","descricao":"Para compras acima de R$ 1.500 na regiao","foto":null},{"titulo":"Novidade","descricao":"Linha de estofados Konfort acabou de chegar","foto":null}];
  const bannerEl = document.getElementById("bannerPromo");
  if (!promocoes.length) {
    bannerEl.style.display = "none";
  } else {
    const grade = document.getElementById("bannerGrade");
    promocoes.forEach(p => {

      });
    }

    btnAdicionar.addEventListener("click", () => {
      alternarItemCarrinho(p, varianteEscolhida());
      const v = varianteEscolhida();
      btnAdicionar.dataset.chave = chaveProduto(p, v ? v.variante : null);
      refletirEstadoBotao(btnAdicionar);
    });
    conteudo.appendChild(btnAdicionar);

    div.appendChild(conteudo);
    return div;
  }

  const btnOrdenarPreco = document.getElementById("btnOrdenarPreco");
  const ordenarLabel = document.getElementById("ordenarLabel");
  let ordemPreco = null;

  function atualizarBotaoOrdenar() {
    if (ordemPreco === "desc") {
      ordenarLabel.textContent = "Maior preco";
      btnOrdenarPreco.classList.remove("asc");
      btnOrdenarPreco.classList.add("ativo");
    } else if (ordemPreco === "asc") {
      ordenarLabel.textContent = "Menor preco";
      btnOrdenarPreco.classList.add("asc");
      btnOrdenarPreco.classList.add("ativo");
    } else {
      ordenarLabel.textContent = "Ordenar por preco";
      btnOrdenarPreco.classList.remove("asc");
      btnOrdenarPreco.classList.remove("ativo");
    }
  }

  btnOrdenarPreco.addEventListener("click", () => {
    if (ordemPreco === null) ordemPreco = "desc";
    else if (ordemPreco === "desc") ordemPreco = "asc";
    else ordemPreco = null;
    atualizarBotaoOrdenar();
    aplicarFiltro();
  });

  function aplicarFiltro() {
    const termo = document.getElementById("busca").value.trim().toLowerCase();
    const catSel = selCategoria.value;
    const fabSel = selFabricante.value;
    const corSel = corSelecionada;
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const filtrados = dados.filter(p => {
      if (catSel && p.categoria !== catSel) return false;
      if (fabSel && p.fabricante !== fabSel) return false;
      if (corSel && p.cor !== corSel) return false;
      if (!termo) return true;
      const alvo = (p.produto + " " + p.categoria + " " + (p.fabricante || "") + " " + (p.cor || "") + " " + (p.specs || "")).toLowerCase();
      return alvo.includes(termo);
    });

    if (ordemPreco) {
      filtrados.sort((a, b) => {
        const pa = a.menorPreco, pb = b.menorPreco;
        if (pa === null && pb === null) return 0;
        if (pa === null) return 1;
        if (pb === null) return -1;
        return ordemPreco === "asc" ? pa - pb : pb - pa;
      });
    }

    filtrados.forEach(p => grid.appendChild(renderCard(p)));
    document.getElementById("contador").textContent = filtrados.length + " produto(s) encontrado(s)";
    document.getElementById("vazio").style.display = filtrados.length === 0 ? "block" : "none";
  }

  document.getElementById("busca").addEventListener("input", aplicarFiltro);
  selCategoria.addEventListener("change", aplicarFiltro);
  selFabricante.addEventListener("change", aplicarFiltro);
  atualizarBotaoOrdenar();
  aplicarFiltro();
</script>
</body>
